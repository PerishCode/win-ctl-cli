name: Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "docs/package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "wrangler.jsonc"
      - "worker/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "docs/package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "wrangler.jsonc"
      - "worker/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
