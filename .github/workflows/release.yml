name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TOOLS: "win-ctl-cli"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate tag and release inputs
        env:
          TAG: ${{ github.ref_name }}
        run: bash scripts/release/accept.sh stable "$TAG"

      - name: Run aggregated release validation
        run: bash scripts/release/verify.sh

  build-linux:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    container: ubuntu:22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config ca-certificates curl

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: bash scripts/release/package.sh "$VERSION" "$TARGET" $TOOLS

      - name: Compute checksums
        run: bash scripts/release/checksum.sh dist/checksums.txt dist/*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  build-darwin:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: bash scripts/release/package.sh "$VERSION" "$TARGET" $TOOLS

      - name: Compute checksums
        run: bash scripts/release/checksum.sh dist/checksums.txt dist/*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  package-skill:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skill zip
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          bash scripts/release/skill.sh "${VERSION}"

      - name: Compute skill checksum
        run: bash scripts/release/checksum.sh dist/checksums.txt "dist/skill-${{ github.ref_name }}.zip"

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-skill
          path: |
            dist/skill-${{ github.ref_name }}.zip
            dist/checksums.txt

  publish:
    needs:
      - validate
      - build-linux
      - build-darwin
      - package-skill
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Merge checksums
        run: bash scripts/release/collate.sh dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
