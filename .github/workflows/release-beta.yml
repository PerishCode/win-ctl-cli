name: Release Beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: Beta tag to publish (must match app/Cargo.toml version, with optional leading v)
        required: true
        type: string
      notes:
        description: Optional beta release notes
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  TOOLS: "win-ctl-cli"

jobs:
  validate-version:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize and validate beta version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="$(bash scripts/release/accept.sh beta "$INPUT_VERSION")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  validate:
    needs: validate-version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run aggregated release validation
        run: bash scripts/release/verify.sh

  build-linux:
    needs:
      - validate-version
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    container: ubuntu:22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config ca-certificates curl

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          VERSION: ${{ needs.validate-version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: bash scripts/release/package.sh "$VERSION" "$TARGET" $TOOLS

      - name: Compute checksums
        run: bash scripts/release/checksum.sh dist/checksums.txt dist/*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-beta-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  build-darwin:
    needs:
      - validate-version
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          VERSION: ${{ needs.validate-version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: bash scripts/release/package.sh "$VERSION" "$TARGET" $TOOLS

      - name: Compute checksums
        run: bash scripts/release/checksum.sh dist/checksums.txt dist/*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-beta-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  package-skill:
    needs:
      - validate-version
      - validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skill zip
        env:
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          bash scripts/release/skill.sh "${VERSION}"

      - name: Compute skill checksum
        run: bash scripts/release/checksum.sh dist/checksums.txt "dist/skill-${{ needs.validate-version.outputs.version }}.zip"

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-beta-skill
          path: |
            dist/skill-${{ needs.validate-version.outputs.version }}.zip
            dist/checksums.txt

  publish:
    needs:
      - validate-version
      - validate
      - build-linux
      - build-darwin
      - package-skill
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Merge checksums
        run: bash scripts/release/collate.sh dist

      - name: Publish GitHub beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          body: ${{ inputs.notes }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
